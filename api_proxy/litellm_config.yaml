# Add any model available on the VT server here.
# Each user provides their own VT_API_KEY via environment variable.
model_list:
  - model_name: Kimi-K2.5
    litellm_params:
      model: openai/Kimi-K2.5
      api_base: https://llm-api.arc.vt.edu/api/v1
      api_key: os.environ/VT_API_KEY

  - model_name: gpt-oss-120b
    litellm_params:
      model: openai/gpt-oss-120b
      api_base: https://llm-api.arc.vt.edu/api/v1
      api_key: os.environ/VT_API_KEY

  - model_name: Qwen3.5-122B-A10B-FP8
    litellm_params:
      model: openai/Qwen3.5-122B-A10B-FP8
      api_base: https://llm-api.arc.vt.edu/api/v1
      api_key: os.environ/VT_API_KEY

  - model_name: glm-4.7-flash
    litellm_params:
      model: openai/glm-4.7-flash:latest
      api_base: http://ads1.datasci.vt.edu:11434/v1
      api_key: ollama

litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
